<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silent Black Space Metronome</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    display: grid;
    place-items: center;
  }

  .app {
    width: 100vw;
    height: 100vh;
    background: #000;
    display: grid;
    place-items: center;
    position: relative;
  }

  .metronome {
    position: relative;
    width: min(78vmin, 740px);
    height: min(78vmin, 740px);
    display: grid;
    place-items: center;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
  }

  .inner-ring {
    position: absolute;
    width: 62%;
    height: 62%;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .marks {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }

  .mark {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 12px;
    border-radius: 20px;
    background: rgba(255,255,255,0.22);
    transform-origin: 50% -35vmin;
  }

  .mark.major {
    width: 3px;
    height: 22px;
    background: rgba(255,255,255,0.42);
  }

  .mark.active {
    background: rgba(255,255,255,1);
    box-shadow:
      0 0 10px rgba(255,255,255,0.95),
      0 0 22px rgba(255,255,255,0.65);
  }

  .centre {
    position: relative;
    width: min(36vmin, 340px);
    aspect-ratio: 1;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: #000;
    border: 1px solid rgba(255,255,255,0.26);
    box-shadow:
      0 0 32px rgba(255,255,255,0.08),
      inset 0 0 32px rgba(255,255,255,0.06);
  }

  .countdown {
    font-size: clamp(4rem, 10vmin, 8rem);
    font-weight: 850;
    letter-spacing: -0.08em;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 22px rgba(255,255,255,0.58);
  }

  .cycle {
    position: absolute;
    top: 18%;
    font-size: clamp(0.72rem, 1.5vmin, 1rem);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.62);
  }

  .label {
    position: absolute;
    bottom: 18%;
    font-size: clamp(0.68rem, 1.4vmin, 0.95rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
  }

  .caption {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    width: min(90vw, 780px);
    text-align: center;
    color: rgba(255,255,255,0.38);
    font-size: 0.88rem;
    letter-spacing: 0.05em;
  }
</style>
</head>

<body>
  <main class="app">
    <section class="metronome" aria-label="Silent visual metronome">
      <div class="ring"></div>
      <div class="inner-ring"></div>
      <div class="marks" id="marks"></div>

      <div class="centre">
        <div class="cycle" id="cycleText">Cycle 1</div>
        <div class="countdown" id="countdown">01:00</div>
        <div class="label">Silent · Visual · 60 BPM</div>
      </div>
    </section>

    <div class="caption">
      Pure black visual metronome. One marker step per second. Endless one-minute cycles.
    </div>
  </main>

<script>
  const marksContainer = document.getElementById("marks");
  const countdown = document.getElementById("countdown");
  const cycleText = document.getElementById("cycleText");

  let remaining = 60;
  let cycle = 1;
  let activeMark = 0;
  const marks = [];

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
  }

  function createMarks() {
    for (let i = 0; i < 60; i++) {
      const mark = document.createElement("div");
      mark.className = i % 5 === 0 ? "mark major" : "mark";
      mark.style.transform = `rotate(${i * 6}deg) translateY(35vmin)`;
      marksContainer.appendChild(mark);
      marks.push(mark);
    }
  }

  function render() {
    countdown.textContent = formatTime(remaining);
    cycleText.textContent = `Cycle ${cycle}`;

    marks.forEach(mark => mark.classList.remove("active"));
    marks[activeMark].classList.add("active");
  }

  function tick() {
    activeMark = (activeMark + 1) % 60;

    remaining--;

    if (remaining < 0) {
      remaining = 59;
      cycle++;
    }

    render();
  }

  createMarks();
  render();

  setInterval(tick, 1000);
</script>
</body>
</html>
